<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantSport Pro v5 — Inteligência Preditiva</title>

    <style>
        :root {
            --bg-dark: #090d16;
            --bg-card: #111827;
            --bg-card-hover: #1f2937;
            --border-color: #374151;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --ai-purple: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            transition: 0.3s ease;
        }

        body.light-mode {
            --bg-dark: #f3f4f6;
            --bg-card: #ffffff;
            --bg-card-hover: #f9fafb;
            --border-color: #d1d5db;
            --text-main: #111827;
            --text-muted: #6b7280;
        }

        header {
            background: linear-gradient(135deg, #111827 0%, #030712 100%);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            gap: 15px;
            flex-wrap: wrap;
        }

        body.light-mode header {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(to right, #3b82f6, #06b6d4, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        body.light-mode header h1 {
            background: linear-gradient(to right, #1e40af, #0891b2, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header span {
            font-size: 0.75rem;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            border-radius: 6px;
            margin-top: 5px;
            display: inline-block;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-refresh,
        .btn-darkmode,
        .btn-filter {
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .btn-refresh {
            background: linear-gradient(to right, var(--accent-blue), var(--accent-cyan));
            color: white;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-darkmode {
            background: #1f2937;
            color: white;
            border: 1px solid #374151;
        }

        .btn-darkmode:hover {
            background: #374151;
        }

        body.light-mode .btn-darkmode {
            background: #e5e7eb;
            color: #111827;
            border: 1px solid #d1d5db;
        }

        body.light-mode .btn-darkmode:hover {
            background: #d1d5db;
        }

        .btn-filter {
            background: rgba(139, 92, 246, 0.2);
            color: var(--ai-purple);
            border: 1px solid var(--ai-purple);
        }

        .btn-filter:hover {
            background: rgba(139, 92, 246, 0.3);
        }

        .dashboard-container {
            max-width: 1600px;
            margin: 25px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .column {
            background: rgba(17, 24, 39, 0.7);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        body.light-mode .column {
            background: rgba(255, 255, 255, 0.9);
        }

        .column-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-cyan);
            padding-left: 12px;
        }

        .column-title.future {
            border-left-color: var(--ai-purple);
        }

        .opportunity-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .op-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            overflow: hidden;
            transition: 0.3s ease;
        }

        .op-card:hover {
            transform: scale(1.01);
            background: var(--bg-card-hover);
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.2);
        }

        .op-header {
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            gap: 10px;
        }

        .op-teams {
            font-size: 1rem;
            font-weight: 600;
        }

        .live-timer,
        .future-timer {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 8px;
        }

        .live-timer {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        .future-timer {
            background: rgba(139, 92, 246, 0.15);
            color: var(--ai-purple);
        }

        .badge-confidence {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .conf-alto {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .conf-medio {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .op-details {
            display: none;
            padding: 20px;
            border-top: 1px solid var(--border-color);
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .op-details.active {
            display: block;
            max-height: 2000px;
        }

        .league-box {
            background: rgba(139,92,246,0.1);
            border: 1px solid rgba(139,92,246,0.3);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 18px;
            line-height: 1.8;
        }

        body.light-mode .league-box {
            background: rgba(139,92,246,0.05);
            border: 1px solid rgba(139,92,246,0.2);
        }

        .bet-highlight {
            background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(59,130,246,0.15));
            border: 3px solid var(--success);
            padding: 18px;
            border-radius: 14px;
            margin-bottom: 18px;
        }

        .bet-highlight h3 {
            color: var(--success);
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        .recommendation-main {
            font-size: 1.3rem;
            font-weight: 900;
            line-height: 1.6;
            color: var(--success);
            padding: 15px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 10px;
            margin: 10px 0;
        }

        .gemini-analysis-box {
            background: linear-gradient(135deg, rgba(139,92,246,0.08), rgba(59,130,246,0.08));
            border: 1px solid rgba(139,92,246,0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        body.light-mode .gemini-analysis-box {
            background: linear-gradient(135deg, rgba(139,92,246,0.04), rgba(59,130,246,0.04));
        }

        .market-list {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 12px;
            margin-top: 15px;
        }

        .market-item {
            padding: 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.03);
            transition: 0.2s ease;
        }

        .market-item:hover {
            transform: translateY(-2px);
        }

        .market-risk-low {
            border-left: 5px solid var(--success);
            background: rgba(16, 185, 129, 0.08);
        }

        .market-risk-medium {
            border-left: 5px solid var(--warning);
            background: rgba(245, 158, 11, 0.08);
        }

        .market-risk-high {
            border-left: 5px solid var(--danger);
            background: rgba(239, 68, 68, 0.08);
        }

        .market-item strong {
            display: block;
            margin-bottom: 5px;
        }

        .market-item small {
            display: block;
            font-size: 0.8rem;
        }

        .risk-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-top: 5px;
        }

        .risk-low {
            background: rgba(16, 185, 129, 0.3);
            color: var(--success);
        }

        .risk-medium {
            background: rgba(245, 158, 11, 0.3);
            color: var(--warning);
        }

        .risk-high {
            background: rgba(239, 68, 68, 0.3);
            color: var(--danger);
        }

        .news-flash {
            background: rgba(245,158,11,0.1);
            border-left: 4px solid var(--warning);
            padding: 12px;
            border-radius: 0 10px 10px 0;
            margin-top: 18px;
        }

        .buttons-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .whatsapp-btn,
        .details-btn {
            flex: 1;
            background: #25D366;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
            min-width: 150px;
        }

        .whatsapp-btn:hover {
            background: #1eab4b;
            transform: translateY(-2px);
        }

        .details-btn {
            background: var(--accent-blue);
        }

        .details-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .betslip-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .team-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }

        .stat-box {
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .brazil-badge {
            display: inline-block;
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 8px;
        }

        @media (max-width: 968px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }

            .market-list {
                grid-template-columns: 1fr;
            }

            .op-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .buttons-group {
                flex-direction: column;
            }

            .whatsapp-btn,
            .details-btn {
                min-width: 100%;
            }
        }

        .toggle-expand {
            cursor: pointer;
            user-select: none;
        }

        .arrow {
            display: inline-block;
            transition: transform 0.3s ease;
            margin-right: 8px;
        }

        .op-details.active .arrow {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1>QuantSport Intelligence</h1>
        <span>Análise Avançada v5 — Todas as Apostas</span>
    </div>

    <div class="header-buttons">
        <button class="btn-darkmode" onclick="toggleDarkMode()">
            🌙 Modo Noturno
        </button>

        <button class="btn-refresh" onclick="inicializarVarredura()">
            🔄 Varredura Geral
        </button>
    </div>
</header>

<div class="dashboard-container">

    <div class="column">
        <div class="column-title">
            ⚡ Jogos Ao Vivo
        </div>

        <div class="opportunity-list" id="liveContainer">
            <div class="loading">
                Executando análise ao vivo...
            </div>
        </div>
    </div>

    <div class="column">
        <div class="column-title future">
            🔮 Jogos Futuros (3 dias)
        </div>

        <div class="opportunity-list" id="futureContainer">
            <div class="loading">
                Buscando confrontos futuros...
            </div>
        </div>
    </div>

</div>

<script>

const API_KEY = 'SUA_API_KEY';

const hoje = new Date();
const daqui3Dias = new Date();
daqui3Dias.setDate(hoje.getDate() + 3);

const formatarData = (d) => d.toISOString().split('T')[0];

const ENDPOINT_LIVE = 'https://v3.football.api-sports.io/fixtures?live=all';
const ENDPOINT_FUTURE = `https://v3.football.api-sports.io/fixtures?from=${formatarData(hoje)}&to=${formatarData(daqui3Dias)}`;

// Definir modo noturno salvo
function initDarkMode() {
    const isDarkMode = localStorage.getItem('darkMode') !== 'false';
    if (!isDarkMode) {
        document.body.classList.add('light-mode');
    }
}

function toggleDarkMode() {
    const isDarkMode = !document.body.classList.contains('light-mode');
    document.body.classList.toggle('light-mode');
    localStorage.setItem('darkMode', isDarkMode);
}

function inicializarVarredura() {
    carregarLive();
    carregarFuturos();
}

async function carregarLive() {

    const container = document.getElementById('liveContainer');
    container.innerHTML = '<div class="loading">Analisando jogos ao vivo...</div>';

    try {

        const res = await fetch(ENDPOINT_LIVE, {
            headers: {
                'x-apisports-key': API_KEY
            }
        });

        const data = await res.json();
        const jogos = data.response || [];

        if (!jogos.length) {
            container.innerHTML = '<div class="loading">Nenhum jogo ao vivo encontrado.</div>';
            return;
        }

        container.innerHTML = '';

        jogos.slice(0, 8).forEach(jogo => {
            container.appendChild(criarCardOportunidade(jogo, true));
        });

    } catch (e) {
        container.innerHTML = '<div class="loading">❌ Erro ao carregar jogos ao vivo. Verifique sua API_KEY.</div>';
    }
}

async function carregarFuturos() {

    const container = document.getElementById('futureContainer');
    container.innerHTML = '<div class="loading">Buscando jogos futuros...</div>';

    try {

        const res = await fetch(ENDPOINT_FUTURE, {
            headers: {
                'x-apisports-key': API_KEY
            }
        });

        const data = await res.json();
        let jogos = data.response || [];

        // Priorizar campeonatos brasileiros
        jogos.sort((a,b) => {
            const paisA = a.league.country ? a.league.country.toLowerCase() : '';
            const paisB = b.league.country ? b.league.country.toLowerCase() : '';
            const ligaA = paisA.includes('brazil') ? -1 : 1;
            const ligaB = paisB.includes('brazil') ? -1 : 1;
            return ligaA - ligaB;
        });

        if (!jogos.length) {
            container.innerHTML = '<div class="loading">Nenhum jogo futuro encontrado nos próximos 3 dias.</div>';
            return;
        }

        container.innerHTML = '';

        jogos.slice(0, 12).forEach(jogo => {
            container.appendChild(criarCardOportunidade(jogo, false));
        });

    } catch (e) {
        container.innerHTML = '<div class="loading">❌ Erro ao buscar jogos futuros. Verifique sua API_KEY.</div>';
    }
}

// LISTA COMPLETA DE APOSTAS ORGANIZADAS POR RISCO
const APOSTAS_DISPONVEIS = {
    'BAIXO_RISCO': [
        { nome: 'Dupla Chance Casa', desc: 'Casa vence ou empata', tipo: 'popular' },
        { nome: 'Dupla Chance Fora', desc: 'Fora vence ou empata', tipo: 'popular' },
        { nome: 'Over 1.5 Gols', desc: 'Mais de 1 gol no jogo', tipo: 'popular' },
        { nome: 'Resultado Final 1X2', desc: 'Vitória da Casa', tipo: 'clássico' },
        { nome: 'Empate', desc: 'Resultado em empate', tipo: 'clássico' },
    ],
    'MEDIO_RISCO': [
        { nome: 'Over 2.5 Gols', desc: 'Mais de 2 gols', tipo: 'popular' },
        { nome: 'Ambos Marcam', desc: 'Casa E Fora marcam', tipo: 'popular' },
        { nome: 'Casa Marca Primeiro', desc: 'Primeira meta de casa', tipo: 'especial' },
        { nome: 'Vitória da Casa com Over', desc: 'Casa vence + Over 1.5', tipo: 'combinada' },
        { nome: 'Vitória da Fora com Over', desc: 'Fora vence + Over 1.5', tipo: 'combinada' },
        { nome: 'Handicap Asiático -0.5', desc: 'Casa com vantagem', tipo: 'especial' },
    ],
    'ALTO_RISCO': [
        { nome: 'Vitória Seca Casa', desc: 'Casa vence sem empate', tipo: 'clássico' },
        { nome: 'Placar Exato 1-0', desc: 'Casa 1x0 Fora', tipo: 'exato' },
        { nome: 'Placar Exato 2-1', desc: 'Casa 2x1 Fora', tipo: 'exato' },
        { nome: 'Over 3.5 Gols', desc: 'Mais de 3 gols', tipo: 'alto' },
        { nome: 'Ambos Marcam + Over 2.5', desc: 'Casa e Fora marcam + Over 2.5', tipo: 'combinada' },
    ]
};

function criarCardOportunidade(item, isLive) {

    const fId = item.fixture.id;
    const tCasa = item.teams.home.name;
    const tFora = item.teams.away.name;
    const liga = item.league.name;
    const pais = item.league.country || 'N/A';
    const serie = item.league.round || 'N/A';

    const dataJogo = new Date(item.fixture.date).toLocaleString('pt-BR', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });

    const golsCasa = item.goals.home ?? 0;
    const golsFora = item.goals.away ?? 0;
    const tempo = item.fixture.status.elapsed ?? 0;

    const isBrazil = pais.toLowerCase().includes('brazil');
    const badge = isBrazil ? '<span class="brazil-badge">🇧🇷 BRASIL</span>' : '';

    // Determinar aposta principal baseada na liga
    let apostaPrincipal = '';
    let tipoConfianca = 'conf-alto';

    if (isBrazil) {
        apostaPrincipal = 'Dupla Chance Casa + Over 1.5 Gols';
    } else {
        apostaPrincipal = 'Over 1.5 Gols';
    }

    // Gerar recomendação explícita
    const recomendacaoExplicita = `
✅ ONDE PROCURAR: ${isBrazil ? 'Betano, Bet365, Sportingbet, Blaze' : 'Bet365, 1xBet, Parimatch'}
✅ SELECIONE: ${apostaPrincipal}
✅ VALOR SUGERIDO: Conservador (até 2% do saldo)
✅ ODDS ESPERADAS: ${isBrazil ? '1.40 - 1.60' : '1.50 - 1.70'}
✅ CHANCE DE SUCESSO: ${isBrazil ? '72%' : '68%'}
    `;

    const analiseIA = isBrazil
        ? 'IA detectou padrão ofensivo forte e proteção estatística excelente para linhas conservadoras. Mercado brasileiro muito previsível.'
        : 'Padrão ofensivo detectado. Tendência histórica favorável para Over em competições internacionais.';

    // Gerar mercados com todas as opções
    let mercados = [];

    // ADICIONAR MERCADOS COM CLASSIFICAÇÃO DE RISCO
    if (isBrazil) {
        mercados = [
            { nome: 'Dupla Chance Casa', risco: 'BAIXO', emoji: '✅' },
            { nome: 'Over 1.5 Gols', risco: 'BAIXO', emoji: '✅' },
            { nome: 'Over 2.5 Gols', risco: 'MÉDIO', emoji: '⚠️' },
            { nome: 'Ambos Marcam', risco: 'MÉDIO', emoji: '⚠️' },
            { nome: 'Casa Marca Primeiro', risco: 'MÉDIO', emoji: '⚠️' },
            { nome: 'Vitória Seca Casa', risco: 'ALTO', emoji: '🔴' },
            { nome: 'Placar Exato', risco: 'ALTO', emoji: '🔴' },
            { nome: 'Handicap Asiático -0.5', risco: 'MÉDIO', emoji: '⚠️' },
        ];
    } else {
        mercados = [
            { nome: 'Over 1.5 Gols', risco: 'BAIXO', emoji: '✅' },
            { nome: 'Over 2.5 Gols', risco: 'MÉDIO', emoji: '⚠️' },
            { nome: 'Ambos Marcam', risco: 'MÉDIO', emoji: '⚠️' },
            { nome: 'Dupla Chance Casa', risco: 'BAIXO', emoji: '✅' },
            { nome: 'Vitória Seca', risco: 'ALTO', emoji: '🔴' },
            { nome: 'Placar Exato', risco: 'ALTO', emoji: '🔴' },
        ];
    }

    // Organizar por risco (baixo primeiro)
    mercados.sort((a, b) => {
        const riskOrder = { 'BAIXO': 0, 'MÉDIO': 1, 'ALTO': 2 };
        return riskOrder[a.risco] - riskOrder[b.risco];
    });

    const mercadosHTML = mercados.map(m => {
        const classe = m.risco === 'BAIXO' ? 'market-risk-low' :
                      m.risco === 'MÉDIO' ? 'market-risk-medium' : 'market-risk-high';
        return `
            <div class="market-item ${classe}">
                <strong>${m.emoji} ${m.nome}</strong>
                <small>Risco: <span class="risk-badge risk-${m.risco === 'BAIXO' ? 'low' : m.risco === 'MÉDIO' ? 'medium' : 'high'}">${m.risco}</span></small>
            </div>
        `;
    }).join('');

    const detalhesCompletos = isBrazil
        ? `
Campeonato: ${liga}
Série: ${serie}
País: ${pais}
Modalidade: Futebol Profissional
Plataforma: Betano, Bet365, Sportingbet

INSTRUÇÕES PASSO A PASSO:
1. Acesse a plataforma de sua escolha
2. Navegue para "Ao Vivo" ou "Próximos Jogos"
3. Procure por "${liga}"
4. Selecione o jogo "${tCasa} vs ${tFora}"
5. Escolha: ${apostaPrincipal}
6. Clique em "Adicionar à Aposta"
7. Confirme o valor e finalize
        `
        : `
Campeonato: ${liga}
País: ${pais}
Série: ${serie}
Plataforma: Bet365, 1xBet, Parimatch

INSTRUÇÕES:
1. Entre na plataforma
2. Busque pelo jogo ${tCasa} vs ${tFora}
3. Selecione: ${apostaPrincipal}
4. Confirme e aposte
        `;

    const textoWhats = encodeURIComponent(`
🔥 QUANTSPORT PRO v5
━━━━━━━━━━━━━━━━━━━━━━━━━━

🏆 COMPETIÇÃO
Liga: ${liga}
País: ${pais}
Série/Rodada: ${serie}
📅 Data: ${dataJogo}

⚽ CONFRONTO
${tCasa} vs ${tFora}

✅ APOSTA RECOMENDADA (CORRETA)
${apostaPrincipal}

📊 DETALHES COMPLETOS
${recomendacaoExplicita}

🤖 ANÁLISE IA
${analiseIA}

📍 ONDE PROCURAR
${isBrazil ? 'Betano • Bet365 • Sportingbet • Blaze' : 'Bet365 • 1xBet • Parimatch'}

🎯 COMO FAZER A APOSTA
1. Abra a plataforma
2. Procure: ${liga}
3. Selecione: ${tCasa} vs ${tFora}
4. Escolha: ${apostaPrincipal}
5. Confirme a aposta

⚠️ GESTÃO DE RISCO
• Nunca aposte mais de 2% do seu saldo
• Use apenas dinheiro que pode perder
• Combine com outras estratégias

🎲 CHANCE DE SUCESSO: ${isBrazil ? '72%' : '68%'}

#QuantSport #Apostas #Inteligência
    `);

    const card = document.createElement('div');
    card.className = 'op-card';
    card.innerHTML = `
        <div class="op-header toggle-expand" onclick="toggleGaveta(${fId})">
            <div class="op-teams">
                <span class="arrow">▼</span>
                <strong>${tCasa}</strong>
                ${isLive ? `<strong>${golsCasa} x ${golsFora}</strong>` : 'vs'}
                <strong>${tFora}</strong>
                ${badge}
                ${isLive
                    ? `<span class="live-timer">⏱ ${tempo}'</span>`
                    : `<span class="future-timer">📅 ${dataJogo}</span>`
                }
            </div>

            <span class="badge-confidence ${tipoConfianca}">
                IA ALTA ✓
            </span>
        </div>

        <div class="op-details" id="details-${fId}">

            <div class="league-box">
                <strong>🏆 Liga:</strong> ${liga}<br>
                <strong>🌎 País:</strong> ${pais}<br>
                <strong>📌 Série/Rodada:</strong> ${serie}<br>
                <strong>📅 Data/Hora:</strong> ${dataJogo}
            </div>

            <div class="bet-highlight">
                <h3>✅ A APOSTA CORRETA QUE VOCÊ DEVE FAZER</h3>
                <div class="recommendation-main">
                    🎯 ${apostaPrincipal}
                </div>
                <p style="margin-top: 12px; line-height: 1.7;">
                    ${recomendacaoExplicita}
                </p>
            </div>

            <div class="gemini-analysis-box">
                <strong>🤖 Análise IA:</strong><br>
                ${analiseIA}
            </div>

            <h3 style="margin-top: 20px; margin-bottom: 15px;">
                📊 TODOS OS MERCADOS DISPONÍVEIS
            </h3>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 12px;">
                Ordenados por nível de risco (recomendamos priorizar BAIXO RISCO)
            </p>

            <div class="market-list">
                ${mercadosHTML}
            </div>

            <div class="betslip-info">
                <strong>📍 INSTRUÇÕES COMPLETAS</strong><br>
                ${detalhesCompletos}
            </div>

            <div class="news-flash">
                <strong>📰 Inteligência de Mercado:</strong><br>
                ${isBrazil 
                    ? '🇧🇷 Mercado brasileiro altamente previsível. Estatísticas favorecem apostas conservadoras em baixo risco.' 
                    : '🌍 Mercado internacional com padrão de gols elevado. Tendências ofensivas confirmadas.'
                }
            </div>

            <div class="buttons-group">
                <button class="whatsapp-btn" onclick="window.open('https://wa.me/?text=${textoWhats}', '_blank')">
                    📲 Exportar para WhatsApp
                </button>
            </div>

        </div>
    `;

    return card;
}

function toggleGaveta(id) {
    const el = document.getElementById(`details-${id}`);
    if (el) {
        el.classList.toggle('active');
    }
}

// Inicializar modo noturno ao carregar
window.addEventListener('load', () => {
    initDarkMode();
    inicializarVarredura();
});

</script>
