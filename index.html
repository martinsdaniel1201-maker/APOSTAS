<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantSport Pro v5 — Inteligência Preditiva</title>

    <style>
        :root {
            --bg-dark: #090d16;
            --bg-card: #111827;
            --bg-card-hover: #1f2937;
            --border-color: #374151;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --ai-purple: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            transition: 0.3s ease;
        }

        body.light-mode {
            --bg-dark: #f3f4f6;
            --bg-card: #ffffff;
            --bg-card-hover: #f9fafb;
            --border-color: #d1d5db;
            --text-main: #111827;
            --text-muted: #6b7280;
        }

        header {
            background: linear-gradient(135deg, #111827 0%, #030712 100%);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            gap: 15px;
            flex-wrap: wrap;
        }

        body.light-mode header {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(to right, #3b82f6, #06b6d4, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        body.light-mode header h1 {
            background: linear-gradient(to right, #1e40af, #0891b2, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header span {
            font-size: 0.75rem;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            border-radius: 6px;
            margin-top: 5px;
            display: inline-block;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-refresh,
        .btn-darkmode {
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .btn-refresh {
            background: linear-gradient(to right, var(--accent-blue), var(--accent-cyan));
            color: white;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-darkmode {
            background: #1f2937;
            color: white;
            border: 1px solid #374151;
        }

        .btn-darkmode:hover {
            background: #374151;
        }

        body.light-mode .btn-darkmode {
            background: #e5e7eb;
            color: #111827;
            border: 1px solid #d1d5db;
        }

        body.light-mode .btn-darkmode:hover {
            background: #d1d5db;
        }

        .dashboard-container {
            max-width: 1500px;
            margin: 25px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .column {
            background: rgba(17, 24, 39, 0.7);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        body.light-mode .column {
            background: rgba(255, 255, 255, 0.9);
        }

        .column-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-cyan);
            padding-left: 12px;
        }

        .column-title.future {
            border-left-color: var(--ai-purple);
        }

        .opportunity-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .op-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            overflow: hidden;
            transition: 0.3s ease;
        }

        .op-card:hover {
            transform: scale(1.01);
            background: var(--bg-card-hover);
        }

        .op-header {
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            gap: 10px;
            flex-wrap: wrap;
        }

        .op-teams {
            font-size: 1rem;
            font-weight: 600;
        }

        .live-timer,
        .future-timer {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 8px;
        }

        .live-timer {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        .future-timer {
            background: rgba(139, 92, 246, 0.15);
            color: var(--ai-purple);
        }

        /* BADGE BRASIL */
        .brazil-badge {
            display: inline-block;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 900;
            margin-left: 8px;
            border: 1px solid #15803d;
            box-shadow: 0 2px 8px rgba(34, 197, 94, 0.3);
        }

        .badge-confidence {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .conf-alto {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .op-details {
            display: none;
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }

        .op-details.active {
            display: block;
        }

        .league-box {
            background: rgba(139,92,246,0.1);
            border: 1px solid rgba(139,92,246,0.3);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 18px;
            line-height: 1.8;
        }

        body.light-mode .league-box {
            background: rgba(139,92,246,0.05);
            border: 1px solid rgba(139,92,246,0.2);
        }

        .league-info {
            background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(59,130,246,0.15));
            border: 1px solid rgba(16,185,129,0.3);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 18px;
            line-height: 1.8;
        }

        body.light-mode .league-info {
            background: linear-gradient(135deg, rgba(16,185,129,0.08), rgba(59,130,246,0.08));
        }

        .league-info strong {
            display: block;
            color: var(--accent-cyan);
            margin-bottom: 4px;
        }

        .bet-highlight {
            background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(59,130,246,0.15));
            border: 2px solid var(--success);
            padding: 18px;
            border-radius: 14px;
            margin-bottom: 18px;
        }

        .bet-highlight h3 {
            color: var(--success);
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        .recommendation-main {
            font-size: 1.3rem;
            font-weight: 900;
            line-height: 1.6;
            color: var(--success);
            padding: 12px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 10px;
        }

        .gemini-analysis-box {
            background: linear-gradient(135deg, rgba(139,92,246,0.08), rgba(59,130,246,0.08));
            border: 1px solid rgba(139,92,246,0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        body.light-mode .gemini-analysis-box {
            background: linear-gradient(135deg, rgba(139,92,246,0.04), rgba(59,130,246,0.04));
        }

        .market-list {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 12px;
            margin-top: 15px;
        }

        .market-item {
            padding: 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.03);
        }

        .market-risk-low {
            border-left: 5px solid var(--success);
        }

        .market-risk-medium {
            border-left: 5px solid var(--warning);
        }

        .market-risk-high {
            border-left: 5px solid var(--danger);
        }

        .market-item strong {
            display: block;
            margin-bottom: 5px;
        }

        .market-item small {
            display: block;
            font-size: 0.8rem;
        }

        .news-flash {
            background: rgba(245,158,11,0.1);
            border-left: 4px solid var(--warning);
            padding: 12px;
            border-radius: 0 10px 10px 0;
            margin-top: 18px;
        }

        .platforms-info {
            background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(6,182,212,0.15));
            border: 1px solid rgba(59,130,246,0.3);
            padding: 14px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        body.light-mode .platforms-info {
            background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(6,182,212,0.08));
        }

        .whatsapp-btn {
            width: 100%;
            margin-top: 20px;
            background: #25D366;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .whatsapp-btn:hover {
            background: #1eab4b;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(37, 211, 102, 0.4);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        @media (max-width: 968px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }

            .market-list {
                grid-template-columns: 1fr;
            }

            .op-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1>QuantSport Intelligence</h1>
        <span>Análise Avançada v5</span>
    </div>

    <div class="header-buttons">
        <button class="btn-darkmode" onclick="toggleDarkMode()">
            🌙 Modo Noturno
        </button>

        <button class="btn-refresh" onclick="inicializarVarredura()">
            Executar Varredura Geral
        </button>
    </div>
</header>

<div class="dashboard-container">

    <div class="column">
        <div class="column-title">
            ⚡ Jogos Ao Vivo
        </div>

        <div class="opportunity-list" id="liveContainer">
            <div class="loading">
                Executando análise ao vivo...
            </div>
        </div>
    </div>

    <div class="column">
        <div class="column-title future">
            🔮 Jogos Futuros (3 dias)
        </div>

        <div class="opportunity-list" id="futureContainer">
            <div class="loading">
                Buscando confrontos futuros...
            </div>
        </div>
    </div>

</div>

<script>

const API_KEY = '4ff831b724ea4a0efdbb66bb52e0f6ea';

const hoje = new Date();
const daqui3Dias = new Date();
daqui3Dias.setDate(hoje.getDate() + 3);

const formatarData = (d) => d.toISOString().split('T')[0];

const ENDPOINT_LIVE = 'https://v3.football.api-sports.io/fixtures?live=all';

const ENDPOINT_FUTURE =
`https://v3.football.api-sports.io/fixtures?from=${formatarData(hoje)}&to=${formatarData(daqui3Dias)}`;

// Inicializar modo noturno
function initDarkMode() {
    const isDarkMode = localStorage.getItem('darkMode') !== 'false';
    if (!isDarkMode) {
        document.body.classList.add('light-mode');
    }
}

function toggleDarkMode() {
    const isDarkMode = !document.body.classList.contains('light-mode');
    document.body.classList.toggle('light-mode');
    localStorage.setItem('darkMode', isDarkMode);
}

function inicializarVarredura() {
    carregarLive();
    carregarFuturos();
}

async function carregarLive() {

    const container = document.getElementById('liveContainer');

    container.innerHTML = '<div class="loading">Analisando jogos ao vivo...</div>';

    try {

        const res = await fetch(ENDPOINT_LIVE, {
            headers: {
                'x-apisports-key': API_KEY
            }
        });

        const data = await res.json();

        const jogos = data.response || [];

        if (!jogos.length) {
            container.innerHTML = '<div class="loading">Nenhum jogo ao vivo encontrado.</div>';
            return;
        }

        container.innerHTML = '';

        jogos.slice(0, 8).forEach(jogo => {
            container.appendChild(criarCardOportunidade(jogo, true));
        });

    } catch (e) {
        container.innerHTML = '<div class="loading">Erro ao carregar jogos ao vivo.</div>';
    }
}

async function carregarFuturos() {

    const container = document.getElementById('futureContainer');

    container.innerHTML = '<div class="loading">Buscando jogos futuros...</div>';

    try {

        const res = await fetch(ENDPOINT_FUTURE, {
            headers: {
                'x-apisports-key': API_KEY
            }
        });

        const data = await res.json();

        let jogos = data.response || [];

        // Priorizar campeonatos brasileiros
        jogos.sort((a,b) => {
            const paisA = (a.league.country || '').toLowerCase();
            const paisB = (b.league.country || '').toLowerCase();
            const ligaA = paisA.includes('brazil') ? -1 : 1;
            const ligaB = paisB.includes('brazil') ? -1 : 1;
            return ligaA - ligaB;
        });

        if (!jogos.length) {
            container.innerHTML = '<div class="loading">Nenhum jogo futuro encontrado.</div>';
            return;
        }

        container.innerHTML = '';

        jogos.slice(0, 12).forEach(jogo => {
            container.appendChild(criarCardOportunidade(jogo, false));
        });

    } catch (e) {
        container.innerHTML = '<div class="loading">Erro ao buscar jogos futuros.</div>';
    }
}

function criarCardOportunidade(item, isLive) {

    const fId = item.fixture.id;
    const tCasa = item.teams.home.name;
    const tFora = item.teams.away.name;
    const liga = item.league.name;
    const pais = item.league.country || 'N/A';
    const rodada = item.league.round || 'Não informada';

    const dataJogo = new Date(item.fixture.date)
        .toLocaleString('pt-BR');

    const golsCasa = item.goals.home ?? 0;
    const golsFora = item.goals.away ?? 0;

    const tempo = item.fixture.status.elapsed ?? 0;

    // DETECTAR SE É CAMPEONATO BRASILEIRO
    const isBrasil = pais.toLowerCase().includes('brazil');
    
    let apostaPrincipal = '';
    let recomendacaoExplicita = '';
    let geminiOpinion = '';
    let flashNoticia = '';
    let plataformas = '';

    let mercados = [];

    // LÓGICA SEPARADA PARA BR vs INTERNACIONAL
    if (isBrasil) {

        apostaPrincipal = 'Dupla Chance Casa + Over 1.5 Gols';

        recomendacaoExplicita = `
✔ Apostar em: ${tCasa} ou empate
✔ Apostar em: Mais de 1.5 gols
✔ Mercado mais seguro disponível
        `;

        geminiOpinion = `
A IA detectou padrão ofensivo forte e boa proteção estatística
para linhas conservadoras no futebol brasileiro.
        `;

        flashNoticia =
        '📊 Alta movimentação no mercado brasileiro nas últimas horas.';

        // Plataformas brasileiras
        plataformas = '🇧🇷 Betano • Bet365 • Sportingbet • Blaze • 1xBet';

        mercados = [
            {
                nome: 'Dupla Chance Casa',
                risco: 'BAIXO',
                classe: 'market-risk-low'
            },
            {
                nome: 'Over 1.5 Gols',
                risco: 'BAIXO',
                classe: 'market-risk-low'
            },
            {
                nome: 'Casa marca primeiro',
                risco: 'MÉDIO',
                classe: 'market-risk-medium'
            },
            {
                nome: 'Ambos Marcam',
                risco: 'MÉDIO',
                classe: 'market-risk-medium'
            },
            {
                nome: 'Over 2.5 Gols',
                risco: 'MÉDIO',
                classe: 'market-risk-medium'
            },
            {
                nome: 'Vitória seca',
                risco: 'ALTO',
                classe: 'market-risk-high'
            }
        ];

    } else {

        apostaPrincipal = 'Over 2.5 Gols';

        recomendacaoExplicita = `
✔ Apostar em: Mais de 2.5 gols
✔ Tendência ofensiva detectada
✔ Mercados de gols em alta
        `;

        geminiOpinion = `
O algoritmo detectou padrão ofensivo elevado baseado em média
recente de gols e pressão ofensiva em competições internacionais.
        `;

        flashNoticia =
        '🌍 Mercado internacional indica tendência de gols.';

        // Plataformas internacionais
        plataformas = '🌍 Bet365 • 1xBet • Parimatch • Pinnacle • Betfair';

        mercados = [
            {
                nome: 'Over 1.5 Gols',
                risco: 'BAIXO',
                classe: 'market-risk-low'
            },
            {
                nome: 'Over 2.5 Gols',
                risco: 'MÉDIO',
                classe: 'market-risk-medium'
            },
            {
                nome: 'Ambos Marcam',
                risco: 'MÉDIO',
                classe: 'market-risk-medium'
            },
            {
                nome: 'Placar Exato',
                risco: 'ALTO',
                classe: 'market-risk-high'
            }
        ];
    }

    const mercadosHTML = mercados.map(m => `
        <div class="market-item ${m.classe}">
            <strong>${m.nome}</strong><br>
            <small>Risco: ${m.risco}</small>
        </div>
    `).join('');

    const textoWhats = encodeURIComponent(`
🔥 QUANTSPORT PRO v5

🏆 ${liga}
🌎 ${pais}
${isBrasil ? '🇧🇷 CAMPEONATO BRASILEIRO' : '🌍 COMPETIÇÃO INTERNACIONAL'}
📅 ${dataJogo}
⚽ ${tCasa} vs ${tFora}

✅ APOSTA RECOMENDADA (CORRETA):
${apostaPrincipal}

📊 DETALHES:
${recomendacaoExplicita}

🤖 ANÁLISE IA:
${geminiOpinion}

📍 PLATAFORMAS PARA APOSTAR:
${plataformas}

⚠️ GESTÃO DE RISCO:
• Nunca aposte mais de 2% do seu saldo
• Use apenas dinheiro que pode perder
    `);

    const card = document.createElement('div');

    card.className = 'op-card';

    card.innerHTML = `

        <div class="op-header" onclick="toggleGaveta(${fId})">

            <div class="op-teams">
                <strong>${tCasa}</strong>
                ${isLive ? `${golsCasa} x ${golsFora}` : 'vs'}
                <strong>${tFora}</strong>

                ${isBrasil ? `<span class="brazil-badge">🇧🇷 BRASIL</span>` : ''}

                ${isLive
                    ? `<span class="live-timer">⏱ ${tempo}'</span>`
                    : `<span class="future-timer">📅 ${dataJogo}</span>`
                }
            </div>

            <span class="badge-confidence conf-alto">
                IA ALTA
            </span>
        </div>

        <div class="op-details" id="details-${fId}">

            <div class="league-info">
                <strong>🏆 Liga:</strong> ${liga}<br>
                <strong>🌎 País:</strong> ${pais}<br>
                <strong>📌 Série/Rodada:</strong> ${rodada}<br>
                <strong>📅 Data/Hora:</strong> ${dataJogo}
            </div>

            <div class="bet-highlight">
                <h3>✅ APOSTA CORRETA PARA FAZER</h3>

                <div class="recommendation-main">
                    ${apostaPrincipal}
                </div>

                <br>

                <div style="white-space: pre-line; line-height:1.8;">
                    ${recomendacaoExplicita}
                </div>
            </div>

            <div class="gemini-analysis-box">
                🤖 ${geminiOpinion}
            </div>

            <h3>
                📊 TODOS OS MERCADOS DISPONÍVEIS
            </h3>

            <div class="market-list">
                ${mercadosHTML}
            </div>

            <div class="platforms-info">
                <strong>📱 PLATAFORMAS RECOMENDADAS:</strong><br>
                ${plataformas}
            </div>

            <div class="news-flash">
                <strong>📰 Radar Inteligente:</strong>
                ${flashNoticia}
            </div>

            <button
                class="whatsapp-btn"
                onclick="window.open('https://wa.me/?text=${textoWhats}', '_blank')">
                📲 Exportar para WhatsApp
            </button>

        </div>
    `;

    return card;
}

function toggleGaveta(id) {

    const el = document.getElementById(`details-${id}`);

    if (el) {
        el.classList.toggle('active');
    }
}

// Inicializar ao carregar
window.addEventListener('load', () => {
    initDarkMode();
    inicializarVarredura();
});

</script>

</body>
</html>
