<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantSport Pro - Live API Integration</title>
    <style>
        :root {
            --bg-primary: #f4f6f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #2563eb;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .theme-toggle {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .banca-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .banca-input-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        input {
            background: var(--bg-primary);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 1rem;
            width: 100%;
        }

        button.btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .section-title {
            font-size: 1.2rem;
            margin-bottom: 16px;
        }

        .opportunity-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .op-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .op-header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .op-header:hover {
            filter: brightness(0.95);
        }

        .op-teams {
            font-weight: 600;
            font-size: 1rem;
        }

        .badge-risk {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .risk-baixo { background-color: rgba(16, 185, 129, 0.15); color: var(--success); }
        .risk-medio { background-color: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .risk-alto { background-color: rgba(239, 68, 68, 0.15); color: var(--danger); }

        .op-details {
            display: none;
            padding: 20px;
            border-top: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.01);
        }

        .op-details.active {
            display: block;
        }

        .grid-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .detail-item h4 {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .detail-item p {
            font-size: 1rem;
            font-weight: 600;
        }

        .step-by-step {
            background: var(--bg-primary);
            padding: 14px;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            margin-top: 12px;
        }

        .step-by-step ol {
            padding-left: 20px;
            margin-top: 8px;
        }

        .step-by-step li {
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        .btn-redirect {
            display: inline-block;
            width: 100%;
            text-align: center;
            background: var(--success);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 16px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>QuantSport <span>⚡ Live Real</span></h2>
        <button class="theme-toggle" id="themeBtn">Modo Noturno</button>
    </header>

    <div class="banca-card">
        <label for="bancaInput" style="font-weight: 600; font-size: 0.9rem; color: var(--text-muted);">SUA BANCA TOTAL ATUAL</label>
        <div class="banca-input-group">
            <input type="number" id="bancaInput" value="1000">
            <button class="btn-primary" onclick="consumirApiFootball()">Atualizar Jogos</button>
        </div>
        <p style="margin-top: 10px; font-size: 0.85rem; color: var(--text-muted);">
            Unidade Recomendada (2%): <strong id="txtUnidade" style="color: var(--success);">R$ 20,00</strong>
        </p>
    </div>

    <h3 class="section-title">🎯 Oportunidades em Tempo Real (API-Football)</h3>
    
    <div class="opportunity-list" id="liveOpportunities">
        <div class="loading">Clique em "Atualizar Jogos" para buscar partidas ao vivo...</div>
    </div>
</div>

<script>

    // Gerenciamento de Tema
    const themeBtn = document.getElementById('themeBtn');
    themeBtn.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        document.documentElement.setAttribute('data-theme', currentTheme === 'dark' ? 'light' : 'dark');
        themeBtn.textContent = currentTheme === 'dark' ? 'Modo Noturno' : 'Modo Claro';
    });
// 1. Configuração limpa e direta para rodar na nuvem (GitHub Pages)
const API_KEY = '11c2c7ce7d8aa529e41b7a2092eae88e'; // Cole aqui a sua chave real da RapidAPI
const API_URL = 'https://api-football-v1.p.rapidapi.com/v3/fixtures?live=all';
    // Função Principal: Consome dados reais da API-Football
    async function consumirApiFootball() {
    const container = document.getElementById('liveOpportunities');
    container.innerHTML = '<div class="loading">Buscando dados ao vivo na API-Football...</div>';

    // Validação de segurança para você não esquecer de colar a chave
    if(API_KEY === '11c2c7ce7d8aa529e41b7a2092eae88e' || API_KEY === '') {
        container.innerHTML = '<div class="loading" style="color:var(--danger)">Erro: Você precisa inserir sua API Key no código JavaScript!</div>';
        return;
    }

    try {
        // 2. Requisição direta e segura pelo protocolo HTTPS do GitHub
        const resposta = await fetch(API_URL, {
            method: 'GET',
            headers: {
                'x-rapidapi-host': 'api-football-v1.p.rapidapi.com',
                'x-rapidapi-key': API_KEY
            }
        });

        if (!resposta.ok) {
            throw new Error(`Erro no servidor da API: Status ${resposta.status}`);
        }

        const data = await resposta.json();
        const jogosAoVivo = data.response;

        if (!jogosAoVivo || jogosAoVivo.length === 0) {
            container.innerHTML = '<div class="loading">Nenhum jogo ao vivo encontrado no mundo neste exato momento.</div>';
            return;
        }

        // Se houver jogos, renderiza na tela dentro dos blocos minimizados
        renderizarJogosReais(jogosAoVivo);

    } catch (erro) {
        console.error("Erro detalhado na requisição:", erro);
        container.innerHTML = `
            <div class="loading" style="color:var(--danger)">
                Erro na API-Football.<br>
                <span style="font-size:0.8rem; color:var(--text-muted)">
                    ${erro.message}. Verifique se sua chave está correta no código.
                </span>
            </div>`;
    }
}

    // Processa os dados brutos da API e calcula os palpites quantitativos
    function renderizarJogosReais(jogos) {
        const container = document.getElementById('liveOpportunities');
        const bancaAtual = parseFloat(document.getElementById('bancaInput').value) || 0;
        container.innerHTML = '';

        // Pegamos no máximo 5 jogos ao vivo para não estourar a tela
        const limitados = jogos.slice(0, 5);

        limitados.forEach(item => {
            const fId = item.fixture.id;
            const tCasa = item.teams.home.name;
            const tFora = item.teams.away.name;
            const campeonato = item.league.name;
            const tempo = item.fixture.status.elapsed;
            const golsCasa = item.goals.home ?? 0;
            const golsFora = item.goals.away ?? 0;

            // Lógica Quantitativa Base de Risco Automatizada por tempo de jogo
            let risco = "baixo";
            let mercadoSugerido = "Over 0.5 Gols no Jogo";
            let instrucaoJanela = "Entrada imediata no mercado de gols";
            let stakePercentual = 2; // 2% padrão seguro

            if (tempo > 70) {
                risco = "alto";
                mercadoSugerido = "Over 1.5 Gols Asiáticos";
                instrucaoJanela = `Aos ${tempo}', buscar odd acima de @1.90`;
                stakePercentual = 1; // Reduz a stake para risco alto
            } else if (tempo > 45 && tempo <= 70) {
                risco = "medio";
                mercadoSugerido = "Próximo Gol (Live)";
                instrucaoJanela = "Monitore a pressão nos próximos 5 minutos";
                stakePercentual = 1.5;
            }

            const valorStake = (bancaAtual * (stakePercentual / 100)).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            const card = document.createElement('div');
            card.className = 'op-card';
            card.innerHTML = `
                <div class="op-header" onclick="toggleDetalhes(${fId})">
                    <div class="op-teams">
                        ${tCasa} ${golsCasa} x ${golsFora} ${tFora} 
                        <span style="font-size: 0.8rem; color: var(--accent); font-weight:bold; margin-left:8px;">⏱️ ${tempo}'</span>
                    </div>
                    <div>
                        <span class="badge-risk risk-${risco}">Risco ${risco}</span>
                    </div>
                </div>
                <div class="op-details" id="details-${fId}">
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px;">🏆 Liga: ${campeonato}</p>
                    
                    <div class="grid-details">
                        <div class="detail-item">
                            <h4>Mercado Operado</h4>
                            <p>${mercadoSugerido}</p>
                        </div>
                        <div class="detail-item">
                            <h4>Janela de Entrada</h4>
                            <p>${instrucaoJanela}</p>
                        </div>
                        <div class="detail-item">
                            <h4>Valor Sugerido</h4>
                            <p style="color: var(--success);">${valorStake} (${stakePercentual}%)</p>
                        </div>
                        <div class="detail-item">
                            <h4>Análise Quant</h4>
                            <p>Calculado com base em ${tempo} minutos de dados reais coletados via API.</p>
                        </div>
                    </div>

                    <div class="step-by-step">
                        <strong>🛠️ GUIA DE EXECUÇÃO DETALHADO (Clique a Clique)</strong>
                        <ol>
                            <li>Abra a sua plataforma de apostas de preferência.</li>
                            <li>Vá até a barra de pesquisa ou seção 'Ao Vivo' e busque por: <strong>${tCasa}</strong>.</li>
                            <li>Localize o mercado de <strong>${mercadoSugerido}</strong>.</li>
                            <li>Insira exatamente o valor de <strong>${valorStake}</strong> no boletim e confirme.</li>
                        </ol>
                    </div>

                    <a href="https://www.google.com/search?q=apostas+esportivas+${encodeURIComponent(tCasa)}" target="_blank" class="btn-redirect">Buscar Jogo na Plataforma</a>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function toggleDetalhes(id) {
        const el = document.getElementById(`details-${id}`);
        if(el) el.classList.toggle('active');
    }

    function atualizarBanca() {
        const bancaVal = parseFloat(document.getElementById('bancaInput').value) || 0;
        document.getElementById('txtUnidade').textContent = (bancaVal * 0.02).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }
</script>
</body>
</html>
